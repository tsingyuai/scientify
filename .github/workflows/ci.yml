name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Type check
        run: pnpm exec tsc --noEmit

  release:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          NEW_TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1)
          if [[ -z "$NEW_TAG" ]]; then
            echo "No new release tag at HEAD — semantic-release did not cut a release. Skipping ClawHub publish."
            exit 0
          fi
          if [[ -z "$CLAWHUB_TOKEN" ]]; then
            echo "::error::CLAWHUB_TOKEN secret is missing."
            exit 1
          fi

          echo "Cutting ClawHub release for $NEW_TAG"
          npm i -g clawhub@latest

          mkdir -p "$RUNNER_TEMP/clawhub"
          jq -n --arg token "$CLAWHUB_TOKEN" \
            '{registry:"https://clawhub.ai", token:$token}' \
            > "$RUNNER_TEMP/clawhub/config.json"
          export CLAWHUB_CONFIG_PATH="$RUNNER_TEMP/clawhub/config.json"

          # dist/ already built; skills/ and openclaw.plugin.json are committed.
          clawhub package publish ./ \
            --source-ref "refs/tags/$NEW_TAG" \
            --manual-override-reason "GitHub Actions push publish via CLAWHUB_TOKEN" \
            --json
